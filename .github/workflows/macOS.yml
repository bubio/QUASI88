name: macOS Build

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '*.md'
      - 'doc/**'
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '*.md'
      - 'doc/**'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download SDL2 Framework
        run: |
          curl -L -o SDL2.dmg https://github.com/libsdl-org/SDL/releases/download/release-2.32.8/SDL2-2.32.8.dmg
          hdiutil attach SDL2.dmg
          cp -R /Volumes/SDL2/SDL2.framework .
          hdiutil detach /Volumes/SDL2

      - name: Build QUASI88 macOS app
        run: |
          cmake -S. -Bbuild \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_FRAMEWORK_PATH=$(pwd) \
            -DMACOSX_STANDALONE_APP_BUNDLE=ON \
            -DCPACK=ON
          cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QUASI88_macOS
          path: build/QUASI88.app

      - name: Package for Release
        if: ${{ github.event_name == 'release' && !env.ACT }}
        run: |
          cpack --config build/CPackConfig.cmake -G DragNDrop -B build
          dmg_file=$(ls build/*.dmg | head -n 1)
          mv "$dmg_file" build/QUASI88_macOS.dmg

      - name: Update Release
        if: ${{ github.event_name == 'release' && !env.ACT }}
        uses: svenstaro/upload-release-action@v2
        with:
          file: build/QUASI88_macOS.dmg
          overwrite: true
          tag: ${{ github.ref }}
