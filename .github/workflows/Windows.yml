name: Windows Build

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '*.md'
      - 'doc/**'
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '*.md'
      - 'doc/**'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, Win32, ARM64]
        include:
          - arch: x64
            cmake_arch: x64
          - arch: Win32
            cmake_arch: Win32
          - arch: ARM64
            cmake_arch: ARM64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -S . -B build -A ${{ matrix.cmake_arch }} `
            -DCMAKE_BUILD_TYPE=Release `
            -DCPACK=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Install (Collect DLLs)
        run: cmake --install build --prefix dist

      - name: Collect Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item dist/bin/QUASI88.exe artifacts/ -Force
          Copy-Item dist/bin/*.dll artifacts/ -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: QUASI88_Windows_${{ matrix.arch }}
          path: artifacts/

      - name: Package for Release
        if: ${{ github.event_name == 'release' && !env.ACT }}
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/* -DestinationPath "QUASI88_Windows_${{ matrix.arch }}.zip" -Force

      - name: Update Release
        if: ${{ github.event_name == 'release' && !env.ACT }}
        uses: svenstaro/upload-release-action@v2
        with:
          file: QUASI88_Windows_${{ matrix.arch }}.zip
          overwrite: true
          tag: ${{ github.ref_name }}
